<div class="container fade-in">
        <div class="admin-header">
            <h1>
                Panel <span class="gradient-text-primary">Zarządzania</span>
            </h1>
            <p>Zarządzaj treścią i użytkownikami z poziomu bezpiecznego środowiska.</p>
        </div>    <div class="dashboard-grid">
        <aside class="admin-aside">
            
            <div class="glass-card" style="padding: 2rem; text-align: center; border-top: 4px solid var(--primary);">
                <div class="profile-avatar" style="width: 80px; height: 80px; font-size: 2rem; margin: 0 auto 1rem; background: rgba(99, 102, 241, 0.1); display:flex; align-items:center; justify-content:center; border-radius: 50%;">👑</div>
                <h4 class="text-upper-bold" style="margin-bottom: 0.5rem; font-size: 0.8rem; color: var(--text-muted);">Zalogowany jako</h4>
                <p id="admin-name" style="font-weight: 800; font-size: 1.4rem; margin-bottom: 0.8rem; color: var(--text-main);">Ładowanie...</p>
                <span class="badge badge-admin" style="padding: 6px 16px; font-size: 0.75rem; letter-spacing: 1px;">Administrator</span>
            </div>

            <div class="glass-card" style="padding: 1.5rem; border-left: 4px solid var(--accent); background: linear-gradient(to right, rgba(56, 189, 248, 0.05), transparent);">
                <h4 class="text-upper-bold" style="margin-bottom: 1rem; font-size: 0.8rem; color: var(--text-muted);">Status Serwera</h4>
                <div style="display: flex; align-items: center; gap: 10px; color: var(--accent); font-weight: 700; font-size: 1.1rem;">
                    <span style="width: 12px; height: 12px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 15px var(--accent); animation: pulse 2s infinite;"></span>
                    Wszystkie systemy operacyjne
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="stat-card" style="position: relative; overflow: hidden; padding: 1.5rem; text-align: center; border-radius: 16px;">
                    <span class="text-upper-bold" style="font-size:0.7rem;">Wpisy</span>
                    <div class="stat-val gradient-text-silver" id="stat-posts" style="font-size: 2.5rem; margin-top: 0.5rem;">0</div>
                </div>
                <div class="stat-card" style="position: relative; overflow: hidden; padding: 1.5rem; text-align: center; border-radius: 16px; background: linear-gradient(135deg, rgba(16, 185, 129, 0.1) 0%, transparent 100%);">
                    <span class="text-upper-bold" style="font-size:0.7rem;">Użytkownicy</span>
                    <div class="stat-val gradient-text-green" id="stat-users" style="font-size: 2.5rem; margin-top: 0.5rem;">0</div>
                </div>
            </div>
        </aside>

        <main class="admin-main">
            <div class="glass-card" style="padding: 2.5rem; border: 1px solid rgba(255,255,255,0.05);">
                <h2 class="admin-card-title" style="margin-bottom: 2rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 1rem;">
                    <span class="admin-card-icon blue" style="background: rgba(56, 189, 248, 0.1); padding: 10px; border-radius: 12px;">✨</span> 
                    <span class="gradient-text-silver" style="font-size: 1.5rem; margin-left: 10px;">Utwórz Nowy Wpis</span>
                </h2>
                <form id="add-post-form">
                    <div class="form-group" style="margin-bottom: 1.5rem;">
                        <label style="color: var(--text-muted); font-weight: 600; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px;">Tytuł Wpisu</label>
                        <input type="text" id="post-title" required placeholder="Wpisz chwytliwy tytuł..." style="margin-top: 0.5rem; font-size: 1.1rem; padding: 1rem;">
                    </div>
                    <div class="form-group" style="margin-bottom: 1.5rem;">
                        <label style="color: var(--text-muted); font-weight: 600; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px;">Treść Artykułu</label>
                        <textarea id="post-content" rows="10" required placeholder="Formatowanie Markdown jest wspierane (w przyszłości)..." style="margin-top: 0.5rem; font-size: 1rem; padding: 1rem; line-height: 1.6;"></textarea>
                    </div>
                    
                    <div style="background: rgba(251, 191, 36, 0.05); border: 1px solid rgba(251, 191, 36, 0.2); border-radius: 12px; padding: 1.2rem; margin: 1.5rem 0;">
                        <div class="form-group" style="display: flex; align-items: center; gap: 15px; margin: 0;">
                            <input type="checkbox" id="post-premium" style="width: 24px; height: 24px; cursor: pointer; accent-color: #fbbf24;">
                            <label for="post-premium" style="color: #fbbf24; font-weight: 700; cursor: pointer; font-size: 1.1rem; user-select: none;">⭐ Oznacz ten artykuł jako Premium (Tylko dla subskrybentów)</label>
                        </div>
                    </div>
                    
                    <button type="submit" style="width: 100%; margin-top: 1rem; padding: 1rem; font-size: 1.1rem; letter-spacing: 1px; box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.4);">
                        🚀 Opublikuj Post do Systemu
                    </button>
                </form>
                <div id="status-msg" style="margin-top: 1.5rem; font-size: 1rem; text-align: center; font-weight: 700;"></div>
            </div>

            <div class="glass-card" style="padding: 2.5rem; border: 1px solid rgba(255,255,255,0.05);">
                <h2 class="admin-card-title" style="margin-bottom: 2rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 1rem;">
                    <span class="admin-card-icon purple" style="background: rgba(168, 85, 247, 0.1); padding: 10px; border-radius: 12px;">📋</span> 
                    <span class="gradient-text-silver" style="font-size: 1.5rem; margin-left: 10px;">Zarządzanie Wpisami</span>
                </h2>
                <div id="admin-posts-list" style="display: flex; flex-direction: column; gap: 1rem;">
                    <!-- Ładowane z JS -->
                </div>
            </div>

            <div class="glass-card" style="padding: 2.5rem; border: 1px solid rgba(255,255,255,0.05);">
                <h2 class="admin-card-title" style="margin-bottom: 2rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 1rem;">
                    <span class="admin-card-icon green" style="background: rgba(16, 185, 129, 0.1); padding: 10px; border-radius: 12px;">🛡️</span> 
                    <span class="gradient-text-silver" style="font-size: 1.5rem; margin-left: 10px;">Kontrola Użytkowników</span>
                </h2>
                <div id="users-list" style="display: flex; flex-direction: column; gap: 1rem;">
                    <!-- Ładowane z JS -->
                </div>
            </div>
        </main>
    </div>
</div>
