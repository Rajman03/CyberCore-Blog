<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <title>Nowe Hasło | SECURE.BLOG</title>
</head>
<body>
    <div class="container fade-in" style="max-width: 450px; margin-top: 10vh;">
        <div class="glass-card" style="padding: 3rem 2rem;">
            <div style="text-align: center; margin-bottom: 2.5rem;">
                <div style="width: 60px; height: 60px; background: var(--accent); border-radius: 16px; margin: 0 auto 1.5rem; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3);">🛡️</div>
                <h1 style="font-size: 2rem; margin-bottom: 0.5rem;">Nowe Hasło</h1>
                <p style="color: var(--text-muted); font-size: 0.9rem;">Wprowadź swoje nowe, silne hasło</p>
            </div>

            <form id="reset-form" style="display: flex; flex-direction: column; gap: 1.5rem;">
                <div class="form-group">
                    <label>Nowe Hasło</label>
                    <input type="password" id="password" required placeholder="Min. 8 znaków">
                </div>
                
                <button type="submit" style="width: 100%; padding: 14px; font-weight: 700; margin-top: 1rem; background: var(--accent);">Zaktualizuj Hasło</button>
            </form>

            <div id="status-msg" style="margin-top: 1.5rem; font-size: 0.85rem; text-align: center; min-height: 1.2rem;"></div>
        </div>
    </div>

    <script src="js/core.js"></script>
    <script>
        document.getElementById('reset-form').onsubmit = async (e) => {
            e.preventDefault();
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');
            const btn = e.target.querySelector('button');
            const msg = document.getElementById('status-msg');
            
            if (!token) {
                msg.style.color = 'var(--danger)';
                msg.innerText = '❌ Brak poprawnego tokenu.';
                return;
            }

            try {
                btn.disabled = true;
                btn.innerText = 'Aktualizacja...';
                
                await API.fetch('/auth/reset-password', {
                    method: 'POST',
                    body: JSON.stringify({ 
                        token: token,
                        password: document.getElementById('password').value 
                    })
                });
                
                alert('Hasło zmienione pomyślnie! Możesz się zalogować.');
                window.location.href = 'login.html';
            } catch (err) {
                msg.style.color = 'var(--danger)';
                msg.innerText = `❌ ${err.message}`;
            } finally {
                btn.disabled = false;
                btn.innerText = 'Zaktualizuj Hasło';
            }
        };
    </script>
</body>
</html>
