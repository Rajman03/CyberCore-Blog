<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <title>Panel Admina | SECURE.BLOG</title>
</head>
<body>
    <nav>
        <div class="logo" onclick="window.location.href='/'" style="cursor: pointer;">SECURE.BLOG</div>
        <div id="nav-links" style="display: flex; align-items: center; gap: 20px;"></div>
    </nav>

    <div class="container fade-in" style="max-width: 1300px;">
        <div class="dashboard-grid">
            <aside style="display: flex; flex-direction: column; gap: 1.5rem;">
                <div class="glass-card" style="padding: 1.5rem;">
                    <h4 style="color: var(--text-muted); margin-bottom: 1rem; font-size: 0.8rem; text-transform: uppercase;">Status Systemu</h4>
                    <div style="display: flex; align-items: center; gap: 10px; color: var(--accent); font-weight: 700;">
                        <span style="width: 8px; height: 8px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 10px var(--accent);"></span>
                        Silnik SQL Online
                    </div>
                </div>

                <div class="stat-card">
                    <span style="font-size: 0.8rem; color: var(--text-muted);">Łącznie Postów</span>
                    <div class="stat-val" id="stat-posts">0</div>
                </div>

                <div class="stat-card">
                    <span style="font-size: 0.8rem; color: var(--text-muted);">Użytkownicy</span>
                    <div class="stat-val" id="stat-users">0</div>
                </div>

                <div class="glass-card" style="padding: 1.5rem;">
                    <h4 style="color: var(--text-muted); margin-bottom: 1rem; font-size: 0.8rem; text-transform: uppercase;">Twoja Sesja</h4>
                    <p id="admin-name" style="font-weight: 700; margin-bottom: 0.5rem;">Ładowanie...</p>
                    <span class="badge badge-admin">Administrator</span>
                </div>
            </aside>

            <main style="display: flex; flex-direction: column; gap: 2rem;">
                <div class="glass-card">
                    <h2 style="margin-bottom: 1.5rem; display: flex; align-items: center; gap: 10px;">
                        <span>🛡️</span> Centrum Dowodzenia
                    </h2>
                    <form id="add-post-form">
                        <div class="form-group">
                            <label>Tytuł Posta</label>
                            <input type="text" id="post-title" required placeholder="O czym dziś napiszemy?">
                        </div>
                        <div class="form-group">
                            <label>Treść</label>
                            <textarea id="post-content" rows="6" required placeholder="Wpisz treść posta..."></textarea>
                        </div>
                        <button type="submit" style="width: 100%;">Opublikuj w Bazie Danych</button>
                    </form>
                    <div id="status-msg" style="margin-top: 1rem; font-size: 0.9rem;"></div>
                </div>

                <div class="glass-card">
                    <h2 style="margin-bottom: 1.5rem; display: flex; align-items: center; gap: 10px;">
                        <span>📋</span> Zarządzanie Postami
                    </h2>
                    <div id="admin-posts-list" style="display: flex; flex-direction: column; gap: 1rem;">
                    </div>
                </div>

                <div class="glass-card">
                    <h2 style="margin-bottom: 1.5rem; display: flex; align-items: center; gap: 10px;">
                        <span>👥</span> Uprawnienia Użytkowników
                    </h2>
                    <div id="users-list" style="display: flex; flex-direction: column; gap: 1rem;">
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="js/core.js"></script>
    <script>
        let currentUser = null;

        async function init() {
            try {
                const meData = await API.me();
                if (!meData || meData.user.role !== 'admin') {
                    window.location.href = '/';
                    return;
                }
                currentUser = meData.user;
                updateNav();
                document.getElementById('admin-name').innerText = currentUser.username;
                
                // Initialize admin logic
                if (window.initAdmin) window.initAdmin();
            } catch (err) {
                console.error('Init error:', err);
                window.location.href = '/';
            }
        }

        function updateNav() {
            const navLinks = document.getElementById('nav-links');
            navLinks.innerHTML = `
                <div class="nav-user-widget">
                    <span class="nav-user-greeting">Witaj,<span class="nav-user-name">${currentUser.username}</span></span>
                    <span class="badge badge-${currentUser.role}" style="font-size: 0.65rem;">${currentUser.role}</span>
                </div>
                <a href="/" class="nav-link">Home</a>
                <a href="/profile.html" class="nav-link">Mój Profil</a>
                <a href="/admin.html" class="nav-link active">Panel Admina</a>
                <button onclick="logout()" class="btn-logout">Wyloguj</button>
            `;
        }

        window.onload = init;
    </script>
    <script src="js/admin.js"></script>
</body>
</html>
