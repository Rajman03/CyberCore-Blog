<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <title>SECURE.BLOG | Cyber Security Lab</title>
</head>
<body>
    <nav>
        <div class="logo" onclick="window.location.href='/'" style="cursor: pointer;">SECURE.BLOG</div>
        <div id="nav-links" style="display: flex; align-items: center; gap: 20px;">
            <!-- Dynamiczny kontent nawigacji -->
        </div>
    </nav>

    <div class="container fade-in">
        <header style="margin-bottom: 5rem; text-align: center;">
            <h1 style="font-size: 4rem; margin-bottom: 1.5rem; letter-spacing: -2px; line-height: 1.1;">
                Odkryj <span style="background: linear-gradient(135deg, #818cf8 0%, #c084fc 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">Bezpieczny</span> Kontent
            </h1>
            <p style="color: var(--text-muted); font-size: 1.25rem; max-width: 600px; margin: 0 auto; line-height: 1.6;">
                Profesjonalny poligon doświadczalny bezpieczeństwa: Node.js, SQLite3 oraz zaawansowana kryptografia Argon2id.
            </p>
        </header>

        <section id="posts-container" class="posts-grid">
            <div class="glass-card" style="text-align: center;">Ładowanie postów...</div>
        </section>
    </div>

    <script src="js/core.js"></script>
    <script>
        let currentUser = null;

        async function init() {
            try {
                const meData = await API.me();
                currentUser = meData ? meData.user : null;
                updateNav();
                loadPosts();
            } catch (err) {
                console.error('Init error:', err);
                updateNav();
                loadPosts();
            }
        }

        function updateNav() {
            const navLinks = document.getElementById('nav-links');
            if (currentUser) {
                navLinks.innerHTML = `
                    <div style="display: flex; align-items: center; gap: 12px; margin-right: 10px; padding-right: 20px; border-right: 1px solid var(--glass-border);">
                        <span style="opacity:0.6; font-size:0.85rem;">Witaj, <strong style="color: var(--accent);">${currentUser.username}</strong></span>
                        <span class="badge badge-${currentUser.role}" style="font-size: 0.6rem;">${currentUser.role}</span>
                    </div>
                    <a href="/" class="nav-link">Home</a>
                    <a href="/profile.html" class="nav-link">Mój Profil</a>
                    ${currentUser.role === 'admin' ? '<a href="/admin.html" class="nav-link" style="color: var(--primary); font-weight: 800;">Panel Admina</a>' : ''}
                    <button onclick="logout()" class="secondary" style="padding: 8px 16px; font-size: 0.8rem; border-color: rgba(244, 63, 94, 0.3); color: var(--danger);">Wyloguj</button>
                `;
            } else {
                navLinks.innerHTML = `
                    <a href="/login.html" class="nav-link">Logowanie</a>
                    <a href="/register.html" class="btn-primary-small" style="text-decoration: none;">Dołącz do nas</a>
                `;
            }
        }

        async function loadPosts() {
            try {
                const posts = await API.getPosts();
                const container = document.getElementById('posts-container');
                container.innerHTML = '';

                if (!posts || posts.length === 0) {
                    container.innerHTML = '<div class="glass-card" style="grid-column: 1/-1; text-align: center;">Brak postów do wyświetlenia.</div>';
                    return;
                }

                for (const post of posts) {
                    const card = document.createElement('div');
                    card.className = 'glass-card fade-in';
                    card.innerHTML = `
                        <div class="post-meta">${new Date(post.created_at).toLocaleDateString()} • ${post.author}</div>
                        <h2 style="margin-bottom:1rem;">${post.title}</h2>
                        <p style="color: var(--text-muted); line-height: 1.7; font-size: 0.95rem; margin-bottom: 2rem;">${post.content}</p>
                        
                        <div class="comments-section" style="border-top: 1px solid var(--glass-border); padding-top: 1.5rem;">
                            <h4 style="font-size: 0.8rem; text-transform: uppercase; color: var(--text-muted); margin-bottom: 1rem;">Komentarze</h4>
                            <div id="comments-${post.id}" style="display: flex; flex-direction: column; gap: 0.8rem; margin-bottom: 1.5rem;">
                                <p style="font-size: 0.8rem; color: var(--text-muted);">Ładowanie komentarzy...</p>
                            </div>
                            
                            ${currentUser ? `
                                <div class="comment-form" style="display: flex; gap: 10px;">
                                    <input type="text" id="input-${post.id}" placeholder="Napisz bezpieczny komentarz..." 
                                           style="flex: 1; padding: 8px 12px; font-size: 0.85rem; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 8px; color: white;">
                                    <button onclick="postComment(${post.id})" style="padding: 8px 16px; font-size: 0.8rem;">Wyślij</button>
                                </div>
                            ` : `
                                <p style="font-size: 0.75rem; color: var(--text-muted); text-align: center;">
                                    <a href="login.html" style="color: var(--primary);">Zaloguj się</a>, aby dodać komentarz.
                                </p>
                            `}
                        </div>
                    `;
                    container.appendChild(card);
                    loadComments(post.id);
                }
            } catch (err) {
                console.error('Error loading posts:', err);
            }
        }

        async function loadComments(postId) {
            const container = document.getElementById(`comments-${postId}`);
            try {
                const comments = await API.getComments(postId);
                container.innerHTML = '';
                
                if (comments.length === 0) {
                    container.innerHTML = '<p style="font-size: 0.8rem; color: var(--text-muted); opacity: 0.6;">Brak komentarzy. Bądź pierwszy!</p>';
                    return;
                }

                comments.forEach(comment => {
                    const div = document.createElement('div');
                    div.style.cssText = 'background: rgba(255,255,255,0.03); padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05);';
                    div.innerHTML = `
                        <div style="display: flex; justify-content: space-between; margin-bottom: 4px;">
                            <span style="font-size: 0.75rem; font-weight: 700; color: var(--accent);">${comment.username}</span>
                            <span style="font-size: 0.65rem; color: var(--text-muted);">${new Date(comment.created_at).toLocaleDateString()}</span>
                        </div>
                        <div style="font-size: 0.85rem; line-height: 1.4; color: var(--text-main);">${comment.content}</div>
                    `;
                    container.appendChild(div);
                });
            } catch (err) {
                container.innerHTML = '<p style="font-size: 0.8rem; color: var(--danger);">Błąd ładowania.</p>';
            }
        }

        async function postComment(postId) {
            const input = document.getElementById(`input-${postId}`);
            const content = input.value.trim();
            if (!content) return;

            try {
                await API.addComment(postId, content);
                input.value = '';
                loadComments(postId);
            } catch (err) {
                alert('Błąd: ' + err.message);
            }
        }

        window.onload = init;
    </script>
</body>
</html>
