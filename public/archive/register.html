<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <title>Rejestracja | SECURE.BLOG</title>
</head>
<body>
    <div class="container fade-in" style="max-width: 450px; margin-top: 10vh;">
        <div class="glass-card" style="padding: 3rem 2rem;">
            <div style="text-align: center; margin-bottom: 2.5rem;">
                <div style="width: 60px; height: 60px; background: var(--accent); border-radius: 16px; margin: 0 auto 1.5rem; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3);">✨</div>
                <h1 style="font-size: 2rem; margin-bottom: 0.5rem;">Dołącz do nas</h1>
                <p style="color: var(--text-muted); font-size: 0.9rem;">Stwórz swoje bezpieczne konto w kilka sekund</p>
            </div>

            <form id="register-form" style="display: flex; flex-direction: column; gap: 1.5rem;">
                <div class="form-group">
                    <label>Nazwa użytkownika</label>
                    <input type="text" id="username" required placeholder="np. CyberNinja">
                </div>
                <div class="form-group">
                    <label>Adres Email</label>
                    <input type="email" id="email" required placeholder="twoj@email.pl">
                </div>
                <div class="form-group">
                    <label>Hasło</label>
                    <input type="password" id="password" required placeholder="Min. 8 znaków">
                </div>
                
                <button type="submit" style="width: 100%; padding: 14px; font-weight: 700; margin-top: 1rem; background: var(--accent);">Zarejestruj się</button>
            </form>

            <div id="error-msg" style="margin-top: 1.5rem; color: var(--danger); font-size: 0.85rem; text-align: center; min-height: 1.2rem;"></div>

            <div style="margin-top: 2rem; text-align: center; font-size: 0.9rem; border-top: 1px solid var(--glass-border); padding-top: 1.5rem;">
                <p style="color: var(--text-muted);">Masz już konto? <a href="login.html" style="color: var(--accent); font-weight: 700;">Zaloguj się</a></p>
            </div>
        </div>
    </div>

    <script src="js/core.js"></script>
    <script>
        document.getElementById('register-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const msg = document.getElementById('error-msg');
            
            try {
                btn.disabled = true;
                btn.innerText = 'Tworzenie konta...';
                msg.innerText = '';

                await API.fetch('/auth/register', {
                    method: 'POST',
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });
                
                alert('Konto stworzone! Możesz się teraz zalogować.');
                window.location.href = 'login.html';
            } catch (err) {
                msg.innerText = `❌ ${err.message}`;
            } finally {
                btn.disabled = false;
                btn.innerText = 'Zarejestruj się';
            }
        };
    </script>
</body>
</html>
