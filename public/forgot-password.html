<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <title>Zapomniałem Hasła | SECURE.BLOG</title>
</head>
<body>
    <div class="container fade-in" style="max-width: 450px; margin-top: 10vh;">
        <div class="glass-card" style="padding: 3rem 2rem;">
            <div style="text-align: center; margin-bottom: 2.5rem;">
                <div style="width: 60px; height: 60px; background: var(--primary); border-radius: 16px; margin: 0 auto 1.5rem; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);">📧</div>
                <h1 style="font-size: 2rem; margin-bottom: 0.5rem;">Reset Hasła</h1>
                <p style="color: var(--text-muted); font-size: 0.9rem;">Wyślemy Ci instrukcje na Twój adres email</p>
            </div>

            <form id="forgot-form" style="display: flex; flex-direction: column; gap: 1.5rem;">
                <div class="form-group">
                    <label>Twój Email</label>
                    <input type="email" id="email" required placeholder="twoj@email.pl">
                </div>
                
                <button type="submit" style="width: 100%; padding: 14px; font-weight: 700; margin-top: 1rem;">Wyślij Instrukcje</button>
            </form>

            <div id="status-msg" style="margin-top: 1.5rem; font-size: 0.85rem; text-align: center; min-height: 1.2rem;"></div>

            <div style="margin-top: 2rem; text-align: center; font-size: 0.9rem; border-top: 1px solid var(--glass-border); padding-top: 1.5rem;">
                <a href="login.html" style="color: var(--text-muted); text-decoration: none;">← Wróć do logowania</a>
            </div>
        </div>
    </div>

    <script src="js/core.js"></script>
    <script>
        document.getElementById('forgot-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const msg = document.getElementById('status-msg');
            
            try {
                btn.disabled = true;
                btn.innerText = 'Przetwarzanie...';
                
                await API.fetch('/auth/forgot-password', {
                    method: 'POST',
                    body: JSON.stringify({ email: document.getElementById('email').value })
                });
                
                msg.style.color = 'var(--accent)';
                msg.innerText = '✅ Jeśli konto istnieje, instrukcje zostały wysłane.';
            } catch (err) {
                msg.style.color = 'var(--danger)';
                msg.innerText = `❌ ${err.message}`;
            } finally {
                btn.disabled = false;
                btn.innerText = 'Wyślij Instrukcje';
            }
        };
    </script>
</body>
</html>
